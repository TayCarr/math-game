<!DOCTYPE html>
<html>
    <head>
        <title>Math Games JavaScript</title>
    </head>
    <body>
        <div class="game">Hello</div>
        <script>
            const gameArea = document.querySelector('.game');
            const btn = document.createElement('button');
            const game = {max:10, arr:['b', 'd', 'a', 'q', 'c']};

            gameArea.append(btn);
            btn.textContent = 'start game';
            btn.addEventListener('click', startGame);

            function startGame(){
                for(let i = 0; i < game.max; i++){
                    const div = document.createElement('div');
                    //game.arr.sort(()=>{ return -1});//this is toggling reverse order
                    game.arr.sort(()=>{ return 0.5 - Math.random()});//random sort order for array
                    div.textContent = game.arr.join(' ');
                    gameArea.append(div);

                }
            }
            
        </script>
    </body>
</html>
